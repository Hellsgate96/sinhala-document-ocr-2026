# Fine-tune on real poem lines (inherits configs/local.yaml).
_inherits: local.yaml

train:
  epochs: 10
  lr: 0.0001

paths:
  poem_labels: data/real/labels/poem_kanyawee.txt
  extra_train_labels: data/real/labels/poem_kanyawee.txt
  resume_checkpoint: models/crnn_best.pth
  finetune_best: models/crnn_finetuned.pth
  finetune_last: models/crnn_finetuned_last.pth
