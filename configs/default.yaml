# ============================================================
# Sinhala Document OCR - central configuration
# ============================================================

project:
  name: sinhala-document-ocr
  seed: 1337

paths:
  data_dir: data
  synthetic_dir: data/synthetic
  synthetic_pages_dir: data/synthetic_pages   # detector-in-the-loop training supplement (scripts/generate_pages.py)
  eval_pages_dir: data/eval_pages             # realistic held-out eval pages (scripts/build_eval_pages.py)
  uploads_dir: data/uploads
  real_dir: data/real
  debug_dir: data/debug
  raw_dir: data/raw
  preprocessed_dir: data/preprocessed
  models_dir: models
  charset_path: models/charset.json
  word_list: src/data/sample_words.txt
  corpus: src/data/corpus_sinhala.txt       # real-sentence corpus (scripts/build_corpus.py)
  form_vocab: src/data/form_vocab.txt   # extra form-field vocabulary (optional)

# ------------------------------------------------------------
# Image / recognition input geometry
# ------------------------------------------------------------
image:
  height: 48          # fixed line height fed to the CRNN (must match checkpoint training)
  max_width: 512      # lines wider than this are resized down
  channels: 1         # 1 = grayscale, 3 = RGB
  pad_value: 255      # padding colour for variable-width batching

# ------------------------------------------------------------
# Synthetic data generation
# ------------------------------------------------------------
synthetic:
  num_samples: 30000             # GPU baseline; use 5000 on CPU-only machines
  large:                         # used by `generate_data.py --large`
    num_samples: 30000             # for --large / full GPU baseline (5000 CPU fallback)
    output_dir: data/synthetic
  split: [0.70, 0.15, 0.15]      # train / val / test
  min_words: 1                   # words_per_line lower bound
  max_words: 12                  # words_per_line upper bound
  corpus_ratio: 0.65             # P(line sampled from the real-sentence corpus)
  numeric_ratio: 0.12            # P(token is a synthetic number/date)
  mixed_ratio: 0.10              # P(token is a Sinhala-English mixed token)
  font_sizes: [24, 28, 32, 36, 40, 48, 56, 64, 72]
  # Font search list. Missing fonts are skipped with a warning.
  # Nirmala UI ships with Windows and supports Sinhala -> good default.
  fonts:
    - "C:/Windows/Fonts/Nirmala.ttc"   # Nirmala UI (Sinhala), ships with Windows
    - "C:/Windows/Fonts/iskpota.ttf"   # Iskoola Pota (if installed)
    - "/usr/share/fonts/truetype/noto/NotoSansSinhala-Regular.ttf"  # Linux/Colab
    - "/usr/share/fonts/truetype/noto/NotoSerifSinhala-Regular.ttf"
    - "fonts/NotoSansSinhala-Regular.ttf"    # run scripts/download_fonts.ps1 / .sh
    - "fonts/NotoSerifSinhala-Regular.ttf"
    - "fonts/AbhayaLibre-Regular.ttf"
    - "fonts/Yaldevi-Variable.ttf"
  augment:
    rotation: true
    rotation_max_deg: 3.0
    perspective: true
    blur: true
    gaussian_noise: true
    brightness_contrast: true
    jpeg_compression: true
    shadow: true
    # v3 domain-gap augmentations (camera-photo realism, see src/data/synthetic_generator.py)
    defocus_blur: true      # box/motion blur instead of plain Gaussian (optics, not resampling)
    paper_texture: true     # correlated grain overlay (paper fibre / scan noise)
    moire: true             # rare low-amplitude interference pattern (screen re-photograph)
    edge_artifact: true     # rare rule-fragment / adjacent-line sliver at a crop edge
    multi_jpeg: true        # occasional second JPEG re-encode pass (multi-generation compression)

# ------------------------------------------------------------
# Model (CRNN) hyper-parameters
# ------------------------------------------------------------
model:
  name: crnn
  cnn_out_channels: 512
  rnn_hidden: 256
  rnn_layers: 2
  dropout: 0.1

# ------------------------------------------------------------
# Training
# ------------------------------------------------------------
train:
  epochs: 40                      # GPU baseline (early stopping usually ends sooner)
  batch_size: 32                  # reference GPU batch; use 64 on large server GPUs
  lr: 0.001
  optimizer: adam          # adam | sgd
  weight_decay: 0.0
  num_workers: 2
  grad_clip: 5.0
  lr_scheduler: plateau    # plateau (ReduceLROnPlateau on val CER) | cosine | none
  lr_factor: 0.5
  lr_patience: 3
  min_lr: 0.000001
  early_stopping_patience: 8   # stop after N validations without val CER improvement
  val_every: 1
  save_best_metric: cer    # checkpoint selection metric (lower is better)
  device: auto             # auto | cuda | cpu

# ------------------------------------------------------------
# Detection (OpenCV baseline)
# ------------------------------------------------------------
detection:
  method: projection       # projection (robust: borders/watermarks/centered lines) | contours
  min_line_height: 8
  min_line_width: 20
  dilate_kernel: [25, 3]   # (width, height) to merge characters into lines
  crop_padding_x: 10
  crop_padding_y: 5
  min_crop_height: 14
  min_contrast: 25         # projection: ignore ink fainter than this vs background (watermarks)
  suppress_borders: true   # projection: mask decorative frames / margin ornaments
  min_ink_frac: 0.004      # projection: row is text when >= this fraction of width is ink
  min_ink_density: 0.01    # projection: drop boxes with less ink than this
  min_height_frac: 0.35    # projection: drop boxes shorter than this x median line height

# ------------------------------------------------------------
# Post-processing
# ------------------------------------------------------------
postprocess:
  vocab_path: src/data/sample_words.txt
  max_edit_distance: 2
# ------------------------------------------------------------
# Recognition inference (uploads / predict.py)
# ------------------------------------------------------------
inference:
  auto_invert: true       # light-on-dark -> dark-on-light (matches synthetic training)
  use_grayscale: true
  binarize: false         # CRNN uses grayscale; avoid harsh binarization on stylized text
  denoise: false          # optional light median blur in prepare_line_for_recognition
  image_height: 48        # must match image.height / training
  min_model_width: 32     # pad short lines instead of stretching
  pad_to_height: true     # pad small crops before upscale


