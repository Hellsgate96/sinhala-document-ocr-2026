# ============================================================
# Sinhala Document OCR - central configuration
# ============================================================

project:
  name: sinhala-document-ocr
  seed: 1337

paths:
  data_dir: data
  synthetic_dir: data/synthetic
  uploads_dir: data/uploads
  real_dir: data/real
  debug_dir: data/debug
  raw_dir: data/raw
  preprocessed_dir: data/preprocessed
  models_dir: models
  charset_path: models/charset.json
  word_list: src/data/sample_words.txt
  form_vocab: src/data/form_vocab.txt   # extra form-field vocabulary (optional)

# ------------------------------------------------------------
# Image / recognition input geometry
# ------------------------------------------------------------
image:
  height: 48          # fixed line height fed to the CRNN (must match checkpoint training)
  max_width: 512      # lines wider than this are resized down
  channels: 1         # 1 = grayscale, 3 = RGB
  pad_value: 255      # padding colour for variable-width batching

# ------------------------------------------------------------
# Synthetic data generation
# ------------------------------------------------------------
synthetic:
  num_samples: 15000             # reference default (local GPU runs)
  large:                         # used by `generate_data.py --large`
    num_samples: 15000             # reference for --large / full GPU baseline
    output_dir: data/synthetic
  split: [0.70, 0.15, 0.15]      # train / val / test
  min_words: 3                   # words_per_line lower bound
  max_words: 15                  # words_per_line upper bound (document-like lines)
  numeric_ratio: 0.12            # P(token is a synthetic number/date)
  mixed_ratio: 0.10              # P(token is a Sinhala-English mixed token)
  font_sizes: [22, 26, 30, 34, 40]
  # Font search list. Missing fonts are skipped with a warning.
  # Nirmala UI ships with Windows and supports Sinhala -> good default.
  fonts:
    - "C:/Windows/Fonts/Nirmala.ttc"   # Nirmala UI (Sinhala), ships with Windows
    - "C:/Windows/Fonts/iskpota.ttf"   # Iskoola Pota (if installed)
    - "/usr/share/fonts/truetype/noto/NotoSansSinhala-Regular.ttf"  # Linux/Colab
    - "fonts/NotoSansSinhala-Regular.ttf"
  augment:
    rotation: true
    rotation_max_deg: 3.0
    perspective: true
    blur: true
    gaussian_noise: true
    brightness_contrast: true
    jpeg_compression: true
    shadow: true

# ------------------------------------------------------------
# Model (CRNN) hyper-parameters
# ------------------------------------------------------------
model:
  name: crnn
  cnn_out_channels: 512
  rnn_hidden: 256
  rnn_layers: 2
  dropout: 0.1

# ------------------------------------------------------------
# Training
# ------------------------------------------------------------
train:
  epochs: 25                      # reference; local.yaml uses 25 for GPU baseline
  batch_size: 32                  # reference GPU batch; use 64 on large server GPUs
  lr: 0.001
  optimizer: adam          # adam | sgd
  weight_decay: 0.0
  num_workers: 2
  grad_clip: 5.0
  val_every: 1
  save_best_metric: cer    # checkpoint selection metric (lower is better)
  device: auto             # auto | cuda | cpu

# ------------------------------------------------------------
# Detection (OpenCV baseline)
# ------------------------------------------------------------
detection:
  min_line_height: 8
  min_line_width: 20
  dilate_kernel: [25, 3]   # (width, height) to merge characters into lines
  crop_padding_x: 10
  crop_padding_y: 5
  min_crop_height: 14

# ------------------------------------------------------------
# Post-processing
# ------------------------------------------------------------
postprocess:
  vocab_path: src/data/sample_words.txt
  max_edit_distance: 2
# ------------------------------------------------------------
# Recognition inference (uploads / predict.py)
# ------------------------------------------------------------
inference:
  auto_invert: true       # light-on-dark -> dark-on-light (matches synthetic training)
  use_grayscale: true
  binarize: false         # CRNN uses grayscale; avoid harsh binarization on stylized text
  denoise: false          # optional light median blur in prepare_line_for_recognition
  image_height: 48        # must match image.height / training
  min_model_width: 32     # pad short lines instead of stretching
  pad_to_height: true     # pad small crops before upscale


